# Example smoltrain project config
# Generated by: smoltrain new <task-name> --goal "..." --classes ...

[task]
name = "routing"
goal = "Classify an LLM request into one of these routing buckets"
classes = ["code", "edit", "chat", "research"]

[base_model]
# HuggingFace repo for the base model to fine-tune
repo = "Qwen/Qwen3-0.6B"
# Local path if already downloaded
# path = "~/modelstore/Qwen3-0.6B"

[gen]
# Number of training examples to generate per class
n_per_class = 150
# Total = n_per_class * len(classes)

[gen.supervisor]
# "anthropic" | "openai" | "local"
provider = "anthropic"
model = "claude-sonnet-4-6"
# For local: base_url = "http://localhost:8000/v1"

[train]
epochs = 3
learning_rate = 2e-4
lora_rank = 8
lora_alpha = 16
batch_size = 4
max_seq_len = 256

[export]
# "gguf" | "mlx"
format = "gguf"
quantization = "Q8_0"

[serve]
# Unix socket path for the daemon
socket = "/tmp/smoltrain-routing.sock"
# Or TCP: host = "127.0.0.1", port = 8765
