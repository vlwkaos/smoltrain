[task]
name = "sentiment"
goal = "Classify customer review sentiment"
classes = ["positive", "negative", "neutral"]

[base_model]
repo = "distilbert-base-uncased"

[gen]
supervisor_url = "https://api.anthropic.com/v1/messages"
supervisor_model = "claude-3-haiku-20240307"
api_key_env = "ANTHROPIC_API_KEY"

[train]
epochs = 3
lr = 2e-5
batch_size = 16
max_seq_len = 128

[serve]
socket = "/tmp/smoltrain-sentiment.sock"
